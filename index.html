<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Morfy - 視覺轉 Markdown 工具</title>
    
    <!-- PWA & iOS Support -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Morfy">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#050505">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Libraries -->
    <script src="https://unpkg.com/turndown/dist/turndown.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="selection-cyan">
    <div class="app-container view-edit">
        <main id="workspace">
            <!-- Left Pane: Editor -->
            <section class="pane editor-pane">
                <div class="pane-header">
                    <span class="header-label">MARKDOWN EDITOR</span>
                    <span class="header-meta">UTF-8</span>
                </div>
                <div id="visualEditor" class="editor-area" contenteditable="true" spellcheck="false"></div>
                <div class="pane-footer">
                    <div class="toolbar">
                        <button class="tool-btn" onclick="visualFormat('formatBlock', 'h1')">H1</button>
                        <button class="tool-btn" onclick="visualFormat('formatBlock', 'h2')">H2</button>
                        <div class="divider"></div>
                        <button class="tool-btn" onclick="visualFormat('bold')"><i data-lucide="bold"></i></button>
                        <button class="tool-btn" onclick="visualFormat('italic')"><i data-lucide="italic"></i></button>
                        <button class="tool-btn" onclick="visualFormat('insertUnorderedList')"><i data-lucide="list"></i></button>
                        <button class="tool-btn" onclick="visualFormat('formatBlock', 'blockquote')"><i data-lucide="quote"></i></button>
                        <div class="divider"></div>
                        <button class="tool-btn" onclick="clearContent()" title="清空全部"><i data-lucide="trash-2"></i></button>
                        <button class="tool-btn preview-toggle-btn" onclick="toggleViewMode()"><i data-lucide="eye"></i></button>
                    </div>
                    <div id="charCount" class="footer-meta">0 CHARS</div>
                </div>
            </section>

            <!-- Right Pane: Magazine Preview -->
            <section class="pane preview-pane">
                <div class="pane-header">
                    <span class="header-label">RESULT</span>
                    <div class="header-actions">
                        <button id="viewToggle" class="action-btn" title="切換代碼/預覽"><i data-lucide="eye"></i> 預覽模式</button>
                        <button id="copyBtn" class="action-btn" title="複製 MD 代碼"><i data-lucide="copy"></i> 複製代碼</button>
                        <button id="downloadBtn" class="action-btn primary" title="下載檔案"><i data-lucide="download"></i> 匯出</button>
                    </div>
                </div>
                <!-- Magazine Preview Container -->
                <div id="magazineContainer" class="magazine-container">
                    <div class="preview-badge">
                        <div class="pulse-dot"></div>
                        SYSTEM ARCHITECTURE STANDARD
                    </div>
                    <h1 id="previewTitle" class="magazine-title">未命名文件</h1>
                    <div id="magazineBody" class="magazine-body">
                        <!-- Content Injected Here -->
                    </div>
                    <div class="preview-footer">
                        <span>MORFY V3.5</span>
                        <span>MARKDOWN READY</span>
                    </div>
                </div>
                <!-- Markdown Source View -->
                <div id="sourceView" class="source-view" style="display: none;">
                    <pre id="markdownOutput" class="code-output"></pre>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
